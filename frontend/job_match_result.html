<!DOCTYPE html>

<html>

<head>

    <title>Job Match Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fc;
        }
        
        .hero {
            background: linear-gradient(135deg, #22c55e, #0ea5e9);
            color: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 25px;
        }
        
        .badge-skill {
            margin: 4px;
            font-size: 14px;
        }
        
        body {
            background: #f4f7fb;
        }
        
        .main-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
        }
        
        .score-card {
            border: none;
            border-radius: 18px;
            text-align: center;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
        
        .metric {
            font-size: 32px;
            font-weight: 700;
        }
        
        .section-card {
            border: none;
            border-radius: 18px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
        
        .skill-badge {
            display: inline-block;
            margin: 5px;
            padding: 8px 14px;
            border-radius: 30px;
            background: #e9f2ff;
            color: #0d6efd;
            font-weight: 600;
        }
        
        .good {
            background: #d4edda;
            color: #198754;
        }
        
        .bad {
            background: #ffe5e5;
            color: #dc3545;
        }
        
        .section-title {
            font-weight: 700;
            margin-bottom: 15px;
        }
        
        .summary-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            line-height: 1.8;
        }
    </style>

</head>

<body>

    <div class="container py-5">

        <div id="result"></div>

        <div class="text-center mt-4">
            <a href="index.html" class="btn btn-primary btn-lg">
 Back To Dashboard
</a>
        </div>

    </div>

    <script>
        const data =
            JSON.parse(localStorage.getItem("jobMatchResult"));

        document.getElementById("result").innerHTML = `

<div class="card main-card shadow p-4">

<div class="hero">

<h2>
Job Match Analysis
</h2>

<p>
AI Powered ATS Compatibility Dashboard
</p>

</div>

<div class="row g-4">

<div class="col-md-4">

<div class="score-card bg-white">

<div class="metric text-success">

${data.match_score}%

</div>

Match Score

</div>

</div>

<div class="col-md-4">

<div class="score-card bg-white">

<div class="metric text-primary">

${data.matched_skills.length}

</div>

Matched Skills

</div>

</div>

<div class="col-md-4">

<div class="score-card bg-white">

<div class="metric text-danger">

${data.missing_skills.length}

</div>

Missing Skills

</div>

</div>

</div>
<div class="section-card bg-white">

<h4 class="section-title">

Skills Detected

</h4>

${data.resume_skills.map(skill =>

`<span class="skill-badge">${skill}</span>`

).join("")}

</div>

<div class="section-card bg-white">

<h4 class="section-title text-primary">

Job Requirements

</h4>

${data.job_skills.map(skill =>

`<span class="skill-badge">${skill}</span>`

).join("")}

</div>

<div class="section-card bg-white">

<h4 class="text-success">

Matched Skills

</h4>

<p class="text-muted">
These requirements are already satisfied.
</p>

${data.matched_skills.map(skill =>

`<span class="skill-badge good">
✓ ${skill}
</span>`

).join("")}

</div>

<div class="section-card bg-white">

<h4 class="text-danger">

Missing Skills

</h4>

<p class="text-muted">
Recommended skills to improve ATS score.
</p>

${data.missing_skills.map(skill =>

`<span class="skill-badge bad">
✗ ${skill}
</span>`

).join("")}

</div>

</div>

`;
    </script>

</body>

</html>
