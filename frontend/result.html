<!DOCTYPE html>

<html>

<head>

    <title>Career Intelligence Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fc;
        }
        
        .hero {
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            color: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 25px;
        }
        
        .badge-skill {
            margin: 4px;
            font-size: 14px;
        }
        
        body {
            background: #f4f7fb;
        }
        
        .main-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
        }
        
        .score-card {
            border: none;
            border-radius: 18px;
            text-align: center;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
        
        .metric {
            font-size: 32px;
            font-weight: 700;
        }
        
        .section-card {
            border: none;
            border-radius: 18px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
        
        .skill-badge {
            display: inline-block;
            margin: 5px;
            padding: 8px 14px;
            border-radius: 30px;
            background: #e9f2ff;
            color: #0d6efd;
            font-weight: 600;
        }
        
        .good {
            background: #d4edda;
            color: #198754;
        }
        
        .bad {
            background: #ffe5e5;
            color: #dc3545;
        }
        
        .section-title {
            font-weight: 700;
            margin-bottom: 15px;
        }
        
        .summary-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            line-height: 1.8;
        }
    </style>

</head>

<body>

    <div class="container py-5">

        <div id="result"></div>

        <div class="text-center mt-4">
            <a href="index.html" class="btn btn-primary btn-lg">
 Back To Dashboard
</a>
        </div>

    </div>

    <script>
        const data = JSON.parse(
            localStorage.getItem("careerResult")
        );

        if (!data) {

            document.getElementById("result").innerHTML = `
        <div class="alert alert-danger">
            No Result Found
        </div>
    `;

        } else {

            let careersHTML = "";

            data.career_prediction.forEach(career => {

                careersHTML += `
        <li class="list-group-item d-flex justify-content-between">
            ${career.role}
            <span class="badge bg-success">
                ${career.score}%
            </span>
        </li>
        `;

            });

            document.getElementById("result").innerHTML = `

    <div class="hero shadow">

        <h2>Career Intelligence Report</h2>

        <p>
            AI Powered Resume Analysis Dashboard
        </p>

    </div>

    <div class="row g-4">

        <div class="col-md-4">

            <div class="score-card bg-white">

                <div class="metric text-success">
                    ${data.resume.resume_score}%
                </div>

                Resume Score

            </div>

        </div>

        <div class="col-md-4">

            <div class="score-card bg-white">

                <div class="metric text-danger">
                    ${data.skill_gap.missing_skills.length}
                </div>

                Skill Gaps

            </div>

        </div>

        <div class="col-md-4">

            <div class="score-card bg-white">

                <div class="metric text-primary">
                    ${data.resume.skills_found.length}
                </div>

                Skills Found

            </div>

        </div>

    </div>

    <div class="section-card bg-white">

        <h4 class="section-title">
            Skills Detected
        </h4>

        ${data.resume.skills_found.map(skill =>
            `<span class="skill-badge">${skill}</span>`
        ).join("")}

    </div>

    <div class="row">

        <div class="col-md-6">

            <div class="section-card bg-white">

                <h4>
                    Missing Skills
                </h4>

                <ul>

                ${data.skill_gap.missing_skills.map(skill =>
                    `<li>${skill}</li>`
                ).join("")}

                </ul>

            </div>

        </div>

        <div class="col-md-6">

            <div class="section-card bg-white">

                <h4>
                    Career Predictions
                </h4>

                <ul class="list-group">

                    ${careersHTML}

                </ul>

            </div>

        </div>

    </div>

    <div class="section-card bg-white">

        <h4>
            Target Role
        </h4>

        <p>
            ${data.roadmap.target_role}
        </p>

        <hr>

        <h5>
            Required Skills
        </h5>

        ${data.roadmap.roadmap.skills.map(skill =>
            `<span class="skill-badge">${skill}</span>`
        ).join("")}

        <hr>

        <h5>
            Tools
        </h5>

        ${data.roadmap.roadmap.tools.map(tool =>
            `<span class="skill-badge">${tool}</span>`
        ).join("")}

        <hr>

        <h5>
            Certifications
        </h5>

        <ul>

        ${data.roadmap.roadmap.certifications.map(cert =>
            `<li>${cert}</li>`
        ).join("")}

        </ul>

        <hr>

        <h5>
            Salary Range
        </h5>

        <h4 class="text-success">
            ${data.roadmap.roadmap.salary_range}
        </h4>

    </div>

    `;

}
    </script>


</body>

</html>
