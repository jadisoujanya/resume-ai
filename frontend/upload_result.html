<!DOCTYPE html>

<html>

<head>
    <title>Resume Analysis Report</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fc;
        }
        
        .hero {
            background: linear-gradient(135deg, #dcbd42, #06b6d4);
            color: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 25px;
        }
        
        .skill-badge {
            margin: 5px;
            font-size: 14px;
        }
        
        .summary-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            line-height: 1.8;
        }
        
        body {
            background: #f4f7fb;
        }
        
        .main-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
        }
        
        .score-card {
            border: none;
            border-radius: 18px;
            text-align: center;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
        
        .metric {
            font-size: 32px;
            font-weight: 700;
        }
        
        .section-card {
            border: none;
            border-radius: 18px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }
        
        .skill-badge {
            display: inline-block;
            margin: 5px;
            padding: 8px 14px;
            border-radius: 30px;
            background: #e9f2ff;
            color: #0d6efd;
            font-weight: 600;
        }
        
        .good {
            background: #d4edda;
            color: #198754;
        }
        
        .bad {
            background: #ffe5e5;
            color: #dc3545;
        }
        
        .section-title {
            font-weight: 700;
            margin-bottom: 15px;
        }
        
        .summary-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            line-height: 1.8;
        }
    </style>

</head>

<body>

    <div class="container py-5">

        <div id="result"></div>

        <div class="text-center mt-4">

            <a href="http://127.0.0.1:8000/download-report" class="btn btn-success">

📄 Download PDF Report

</a>

        </div>

        <div class="text-center mt-4">
            <a href="index.html" class="btn btn-primary btn-lg">
 Back To Dashboard
</a>
        </div>

    </div>

    <script>
        const data = JSON.parse(localStorage.getItem("uploadResult"));

        if (!data || data.error) {

            document.getElementById("result").innerHTML =
                `
<div class="alert alert-danger">
Upload Failed
</div>
`;

        } else {

            document.getElementById("result").innerHTML = `

<div class="card main-card shadow p-4">

<div class="hero">

<h2>
Resume Analysis Report
</h2>

<p>
AI Powered Resume Review Dashboard
</p>

</div>

<div class="row">

<div class="col-md-4">
<div class="score-card bg-white">
<div class="metric text-success">
${data.resume_score ?? 0}
</div>
Resume Score
</div>
</div>

<div class="col-md-4">
<div class="score-card bg-white">
<div class="metric text-warning">
${data.resume_rank || "N/A"}
</div>
Resume Rank
</div>
</div>

<div class="col-md-4">
<div class="score-card bg-white">
<div class="metric text-dark">
${data.total_skills ?? 0}
</div>
Skills Found
</div>
</div>

</div>

<div class="section-card">

<h4 class="section-title text-primary">

ATS Resume Scanner

</h4>

<div class="row">

<div class="col-md-4">

<div class="score-card bg-white">

<div class="metric text-success">

${data.ats_score || 0}%

</div>

ATS Score

</div>

</div>

<div class="col-md-8">

<h5 class="mb-3">
ATS Compatibility Score
</h5>

<div class="progress"
style="
height:35px;
border-radius:20px;
">

<div
class="progress-bar bg-success"
role="progressbar"
style="
width:${data.ats_score || 0}%;
font-size:16px;
font-weight:bold;
">

${data.ats_score || 0}%

</div>

</div>

<br>

<p class="text-muted">

${
(data.ats_score || 0) >= 80

?

"Excellent ATS Compatibility"

:

(data.ats_score || 0) >= 60

?

"Good ATS Compatibility"

:

"Needs ATS Optimization"
}

</p>

</div>

</div>

</div>

<div class="row">


<div class="col-md-6">

<div class="section-card bg-white">

<h4 class="text-danger">
⚠ ATS Issues Found
</h4>

${
(data.ats_issues || []).length > 0

?

(data.ats_issues || []).map(issue =>

`
<span class="badge bg-danger m-1 p-2">
${issue}
</span>
`

).join("")

:

`
<span class="badge bg-success m-1 p-2">
No ATS Issues Found
</span>
`
}

</div>

</div>


<div class="col-md-6">

<div class="section-card bg-white">

<h4 class="text-success">
✅ ATS Recommendations
</h4>

${
(data.ats_recommendations || []).length > 0

?

(data.ats_recommendations || []).map(rec =>

`
<span class="badge bg-success m-1 p-2">
${rec}
</span>
`

).join("")

:

`
<span class="badge bg-primary m-1 p-2">
No Recommendations Needed
</span>
`
}

</div>

</div>

<div class="section-card">

<h4 class="text-info">

📄 Professional Summary

</h4>

<div class="summary-box">
${data.professional_summary || "Not Available"}
</div>

</div>


<div class="section-card">

<h4 class="text-primary">

🧠 Skills Detected

</h4>

${(data.skills_found || []).map(skill =>
`<span class="skill-badge">${skill}</span>`
).join("")}

</div>


<div class="section-card">

<h4 class="text-danger">

❌ Missing Skills for ${data.detected_role}

</h4>

${
(data.missing_skills || []).length > 0

?

(data.missing_skills).map(skill =>

`
<span class="badge bg-danger m-2 p-2">

${skill}

</span>
`

).join("")

:

`
<span class="badge bg-success">

No major skill gaps detected 🎉

</span>
`
}

</div>


<div class="col-md-6">

<div class="section-card bg-white">

<h4 class="text-danger">

🤖 AI Suggestions

</h4>

<ul>

${
(data.ai_suggestions || []).map(
item => `<li>${item}</li>`
).join("")
}

</ul>

</div>

</div>

<div class="section-card text-center">

    <h3 class="text-primary mb-4">
        🚀 Career Level
    </h3>

    <div class="mb-3">

        <span
        class="badge px-4 py-3"
        style="
        font-size:32px;
        border-radius:15px;
        background:
        ${
            data.career_level === "Job Ready"
            ? "#198754"
            :
            data.career_level === "Advanced"
            ? "#0d6efd"
            :
            data.career_level === "Intermediate"
            ? "#ffc107"
            :
            data.career_level === "Developing"
            ? "#fd7e14"
            :
            "#dc3545"
        };
        color:white;
        ">
        ${data.career_level}
        </span>

    </div>

    <p class="lead text-muted">
        ${
            data.career_level === "Job Ready"
            ? "Ready for internships and full-time opportunities."
            :
            data.career_level === "Advanced"
            ? "Strong profile with a few improvements needed."
            :
            data.career_level === "Intermediate"
            ? "Good foundation. Add projects and achievements."
            :
            data.career_level === "Developing"
            ? "Build more technical depth and resume impact."
            :
            "Focus on skills, projects and resume structure."
        }
    </p>

    <hr>

  <div class="career-path text-center mt-4">

<span class="badge bg-danger me-1">Beginner</span> →

<span class="badge bg-warning text-dark me-1">Developing</span> →

<span class="badge bg-info text-dark me-1">Intermediate</span> →

<span class="badge bg-primary me-1">Advanced</span> →

<span class="badge bg-success">Job Ready</span>

</div>

</div>


<div class="section-card">

<h4 class="text-success">
📈 Resume Improvement Predictor
</h4>

<div class="row text-center">

<div class="col-md-4">

<h6>
Current Score
</h6>

<h2 class="text-primary">
${data.resume_score || 0}
</h2>

</div>

<div class="col-md-4">

<h6>
Potential Increase
</h6>

<h2 class="text-warning">
+${data.score_improvement || 0}
</h2>

</div>

<div class="col-md-4">

<h6>
Predicted Score
</h6>

<h2 class="text-success">
${data.predicted_score || 0}
</h2>

</div>

</div>



<p class="text-muted text-center">

Apply the recommended improvements to potentially increase your resume score.

</p>

</div>

<div class="section-card">

<h4 class="text-primary">
📚 Learning Roadmap
</h4>

${
(data.learning_roadmap || []).length > 0

?

(data.learning_roadmap || []).map(item => {

    console.log("ROADMAP:", item);

    if (typeof item === "string") {

        return `
        <div class="card mb-2 border-0 shadow-sm">
            <div class="card-body">
                <h6 class="fw-bold">${item}</h6>
            </div>
        </div>
        `;
    }

    return `
    <div class="card mb-2 border-0 shadow-sm">

        <div class="card-body">

            <h6 class="fw-bold">
                ${item.skill || "Unknown Skill"}
            </h6>

            <p class="mb-1">
                📖 ${item.course || ""}
            </p>

            <p class="mb-1">
                ⏳ ${item.duration || ""}
            </p>

            <span class="badge bg-danger">
                ${item.priority || ""}
            </span>

        </div>

    </div>
    `;
}).join("")

:

`<p>No roadmap generated.</p>`

}

</div>

`;

}
    </script>

</body>

</html>
