<!DOCTYPE html>
<html>

<head>

    <title>Candidate Comparison Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
        }
        
        .hero {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 25px;
        }
        
        .score-card {
            border: none;
            border-radius: 18px;
            text-align: center;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, .08);
            background: white;
        }
        
        .section-card {
            border: none;
            border-radius: 18px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, .08);
            background: white;
        }
        
        .skill-badge {
            display: inline-block;
            margin: 5px;
            padding: 8px 14px;
            border-radius: 30px;
            background: #e9f2ff;
            color: #0d6efd;
            font-weight: 600;
        }
        
        .metric {
            font-size: 32px;
            font-weight: 700;
        }
    </style>
</head>

<body class="bg-light p-4">

    <div class="container">

        <div class="hero shadow">

            <h2>
                Candidate Comparison Report
            </h2>

            <p>
                AI Powered Recruiter Comparison Dashboard
            </p>

        </div>

        <div id="result"></div>

        <div class="text-center mt-4 mb-5">

            <a href="index.html" class="btn btn-primary btn-lg">
 Back To Dashboard
</a>

        </div>
    </div>

    <script>
        const data =
            JSON.parse(
                localStorage.getItem(
                    "compareResult"
                )
            );

        document.getElementById(
            "result"
        ).innerHTML = `


        <div class="row g-4 mb-4">

<div class="col-md-4">
<div class="score-card">
<div class="metric text-success">
${data.resume1_score}
</div>
Resume 1 Score
</div>
</div>

<div class="col-md-4">
<div class="score-card">
<div class="metric text-primary">
${data.resume2_score}
</div>
Resume 2 Score
</div>
</div>

<div class="col-md-4">
<div class="score-card">
<div class="metric text-danger">
${Math.abs(data.resume1_score-data.resume2_score)}
</div>
Score Gap
</div>
</div>

</div>

<div class="section-card">

    <h2 class="text-primary">
        Comparison Summary
    </h2>

    <hr>

   <div class="row g-4 mb-4">

        <div class="col-md-6">

            <h3>
                Resume 1
            </h3>

            <p>
                <strong>Score:</strong>
                ${data.resume1_score}
            </p>

            <p>
                <strong>Skills:</strong>
                <br>
              ${data.resume1_skills.map(
s => `<span class="skill-badge">${s}</span>`
).join("")}
            </p>

            <p>
                <strong>Total Skills:</strong>
                ${data.resume1_skills.length}
            </p>

        </div>

        <div class="col-md-6">

            <h3>
                Resume 2
            </h3>

            <p>
                <strong>Score:</strong>
                ${data.resume2_score}
            </p>

            <p>
                <strong>Skills:</strong>
                <br>
             ${data.resume2_skills.map(
s => `<span class="skill-badge">${s}</span>`
).join("")}
            </p>

            <p>
                <strong>Total Skills:</strong>
                ${data.resume2_skills.length}
            </p>

        </div>

    </div>

    <hr>

    <h3 class="text-success">
        Recommended Candidate
    </h3>

    <div class="alert alert-success">

        <h4>
            ${data.winner}
        </h4>

    </div>

    <hr>

    <h3>
        Recruiter Recommendation
    </h3>

    <p>

        ${
            data.winner === "Tie"

            ?

            `
            Both candidates possess
            similar technical strength.
            Recruiter should evaluate
            projects, experience,
            certifications and
            communication skills.
            `

            :

            `
            ${data.winner}
            demonstrates stronger
            skill coverage and is
            recommended for the
            next hiring stage.
            `
        }

    </p>

    <hr>

    <h3>
        Comparison Insights
    </h3>

    <ul>

        <li>
            Resume 1 Skills:
            ${data.resume1_skills.length}
        </li>

        <li>
            Resume 2 Skills:
            ${data.resume2_skills.length}
        </li>

        <li>
            Score Difference:
            ${Math.abs(
                data.resume1_score -
                data.resume2_score
            )}
        </li>

    </ul>

</div>

`;
    </script>

</body>

</html>
